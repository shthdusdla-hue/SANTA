<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>산타 🐱 고양이 등산 기록</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&family=Gaegu:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --c-bg: #f0f6e8;
  --c-card: rgba(255,255,255,0.92);
  --c-green: #4caf50;
  --c-green2: #81c784;
  --c-green3: #c8e6c9;
  --c-orange: #ff8f00;
  --c-peach: #ffab76;
  --c-sky: #b3e5fc;
  --c-pink: #f8bbd0;
  --c-lavender: #e1bee7;
  --c-cream: #fff9f0;
  --c-brown: #6d4c41;
  --c-text: #2e2e2e;
  --c-muted: #8d8d8d;
  --shadow: 0 4px 20px rgba(0,0,0,0.12);
  --shadow2: 0 2px 10px rgba(0,0,0,0.09);
  --r: 18px;
  --r-sm: 12px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Noto Sans KR',sans-serif;color:var(--c-text);}

/* ── 지도 배경 전체 ── */
#app{width:100vw;height:100vh;position:relative;overflow:hidden;}

/* ── 지도 SVG 배경 ── */
#map-bg{position:absolute;inset:0;width:100%;height:100%;}

/* ── 헤더 ── */
#header{
  position:absolute;top:0;left:0;right:0;
  height:58px;
  background:rgba(255,255,255,0.95);
  backdrop-filter:blur(10px);
  border-bottom:2px solid #e8f5e9;
  display:flex;align-items:center;gap:12px;padding:0 20px;
  z-index:100;
  box-shadow:0 2px 12px rgba(80,120,60,0.1);
}
.logo{
  font-family:'Gaegu',cursive;font-size:26px;font-weight:700;
  color:var(--c-green);display:flex;align-items:center;gap:6px;
}
.logo-cat{width:36px;height:36px;}
#header nav{margin-left:auto;display:flex;gap:8px;}
.nav-btn{
  padding:7px 16px;border-radius:99px;border:2px solid #c8e6c9;
  background:white;font-size:13px;font-family:'Noto Sans KR',sans-serif;
  font-weight:500;color:var(--c-brown);cursor:pointer;
  transition:all .2s;display:flex;align-items:center;gap:5px;
}
.nav-btn:hover,.nav-btn.active{background:var(--c-green);color:white;border-color:var(--c-green);}
.nav-btn.add{background:var(--c-green);color:white;border-color:var(--c-green);font-weight:700;}
.nav-btn.add:hover{background:#388e3c;}

/* ── 마스코트 ── */
.mascot-left,.mascot-right{
  position:absolute;bottom:0;z-index:5;pointer-events:none;
}
.mascot-left{left:250px;}
.mascot-right{right:230px;}

/* ── 좌측 패널 ── */
#panel-left{
  position:absolute;top:68px;left:14px;bottom:10px;
  width:210px;
  display:flex;flex-direction:column;gap:10px;
  z-index:20;overflow-y:auto;
  scrollbar-width:none;
}
#panel-left::-webkit-scrollbar{display:none;}

/* ── 우측 패널 ── */
#panel-right{
  position:absolute;top:68px;right:14px;bottom:10px;
  width:205px;
  display:flex;flex-direction:column;gap:10px;
  z-index:20;overflow-y:auto;
  scrollbar-width:none;
}
#panel-right::-webkit-scrollbar{display:none;}

.panel-card{
  background:var(--c-card);
  border-radius:var(--r);
  padding:14px 16px;
  box-shadow:var(--shadow2);
  border:1.5px solid rgba(200,230,200,0.7);
}
.panel-title{
  font-size:13px;font-weight:700;color:var(--c-brown);
  display:flex;align-items:center;gap:5px;
  margin-bottom:10px;padding-bottom:6px;
  border-bottom:2px dashed #e8f5e9;
}

/* ── 통계 카드 ── */
.stat-row{display:flex;gap:8px;margin-bottom:8px;}
.stat-box{
  flex:1;background:var(--c-cream);border-radius:var(--r-sm);
  padding:10px 8px;text-align:center;
  border:1.5px solid #ffe0b2;
}
.stat-num{font-family:'Gaegu',cursive;font-size:32px;font-weight:700;line-height:1;}
.stat-num.orange{color:var(--c-orange);}
.stat-num.blue{color:#1976d2;}
.stat-num.green{color:var(--c-green);}
.stat-label{font-size:11px;color:var(--c-muted);margin-top:1px;}
.progress-row{margin-top:4px;}
.progress-head{display:flex;justify-content:space-between;font-size:11px;color:var(--c-muted);margin-bottom:4px;}
.progress-bar{height:8px;background:#e8f5e9;border-radius:99px;overflow:hidden;}
