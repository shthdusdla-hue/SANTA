<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>산타 🐱 대한민국 100대 명산 지도 & 필터</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; justify-content: center; align-items: center; background: #f0f2f5; font-family: sans-serif; min-height: 100vh; }
  
  /* 디자인 원본 이미지를 외부 링크로 안전하게 바인딩 */
  #santa-container {
    position: relative;
    width: 1000px;
    height: 1000px;
    background: url('https://raw.githubusercontent.com/shthdusdla-hue/SANTA/main/image_9c597c.jpg') no-repeat center center;
    background-size: contain;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  /* 만약 대문자 .JPG로 올라가 있을 경우를 대비한 백업 처리 */
  #santa-container::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('https://raw.githubusercontent.com/shthdusdla-hue/SANTA/main/image_9c597c.JPG') no-repeat center center;
    background-size: contain;
    z-index: -1;
  }

  /* ── 상단 원본 검색창 위치에 실제 투명 검색창 얹기 ── */
  #real-search-input {
    position: absolute;
    top: 72px;
    left: 683px;
    width: 120px;
    height: 28px;
    border: none;
    background: transparent;
    font-size: 12px;
    padding: 0 5px;
    outline: none;
    z-index: 30;
  }

  /* ── 우측 테마 추천 버튼 위치에 투명 필터 버튼 얹기 ── */
  .filter-btn-mask {
    position: absolute;
    height: 25px;
    cursor: pointer;
    background: rgba(255, 255, 255, 0.01);
    border-radius: 12px;
    z-index: 20;
  }
  .filter-btn-mask.active {
    background: rgba(76, 175, 80, 0.2);
    border: 1.5px solid #4caf50;
  }
  
  #btn-spring { top: 178px; left: 813px; width: 40px; }
  #btn-autumn { top: 178px; left: 857px; width: 40px; }
  #btn-beginner { top: 212px; left: 813px; width: 50px; } 
  #btn-summer { top: 212px; left: 867px; width: 40px; }
  #btn-foodie { top: 247px; left: 813px; width: 40px; } 

  /* ── 지도 위 클릭 가능한 산 인터랙티브 영역 ── */
  .mountain-spot {
    position: absolute;
    width: 42px;
    height: 42px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    transition: transform 0.2s, opacity 0.3s;
    z-index: 10;
  }
  .mountain-spot:hover { transform: scale(1.15); }
  .mountain-spot.hidden { opacity: 0.1; pointer-events: none; }

  /* 주요 명산 좌표 설정 */
  #spot-seoul { top: 305px; left: 345px; }   
  #spot-seorak { top: 220px; left: 455px; }  
  #spot-jiri { top: 550px; left: 450px; }    
  #spot-taebaek { top: 315px; left: 435px; } 
  #spot-hallasan { top: 790px; left: 350px; }

  /* 등산 상태 아이콘 (고양이 발바닥 / 고양이 얼굴 / 깃발) */
  .status-icon {
    font-size: 22px;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: popIn 0.3s ease-out;
    background: rgba(255, 255, 255, 0.9);
    border: 2px solid #4caf50;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }
  
  .spot-label {
    position: absolute;
    bottom: -18px;
    background: rgba(0,0,0,0.7);
    color: white;
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
  }

  @keyframes popIn {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }

  /* ── 우측 하단 진짜 작동하는 댓글창 영역 ── */
  #real-comment-box {
    position: absolute;
    top: 575px; 
    left: 645px;
    width: 295px;
    height: 250px;
    background: #ffffff;
    border-radius: 12px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    font-size: 12px;
    border: 1px solid #e0e0e0;
    z-index: 20;
  }
  #comment-list {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 8px;
    padding-right: 5px;
  }
  .comment-item {
    padding: 6px 4px;
    border-bottom: 1px dashed #eee;
    line-height: 1.4;
  }
  .comment-author { font-weight: bold; color: #4caf50; margin-right: 5px; }
  .comment-form { display: flex; gap: 4px; }
  .comment-input { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 6px; font-size: 11px; }
  .comment-submit { background: #2e2e2e; color: white; border: none; padding: 0 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div id="app">
  <div id="santa-container">
    
    <input type="text" id="real-search-input" placeholder="산 이름 검색..." oninput="searchMountain()">

    <div class="filter-btn-mask" id="btn-spring" onclick="filterTheme('spring')" title="봄 추천 산 보기"></div>
    <div class="filter-btn-mask" id="btn-autumn" onclick="filterTheme('autumn')" title="가을 추천 산 보기"></div>
    <div class="filter-btn-mask" id="btn-beginner" onclick="filterTheme('beginner')" title="등산 초보(등린이) 추천 코스"></div>
    <div class="filter-btn-mask" id="btn-summer" onclick="filterTheme('summer')" title="여름 추천 산 보기"></div>
    <div class="filter-btn-mask" id="btn-foodie" onclick="filterTheme('foodie')" title="주변 맛집 많은 산 코스"></div>

    <div class="mountain-spot" id="spot-seoul" onclick="toggleMountain('seoul')"><span class="spot-label">서울산</span></div>
    <div class="mountain-spot" id="spot-seorak" onclick="toggleMountain('seorak')"><span class="spot-label">설악산</span></div>
    <div class="mountain-spot" id="spot-jiri" onclick="toggleMountain('jiri')"><span class="spot-label">지리산</span></div>
    <div class="mountain-spot" id="spot-taebaek" onclick="toggleMountain('taebaek')"><span class="spot-label">태백산</span></div>
    <div class="mountain-spot" id="spot-hallasan" onclick="toggleMountain('hallasan')"><span class="spot-label">한라산</span></div>

    <div id="real-comment-box">
      <div id="comment-list">
        <div class="comment-item"><span class="comment-author">산타매니아</span>가끔 가는데 등산 맛집이네요 👍</div>
        <div class="comment-item"><span class="comment-author">냥이조아</span>정상 뷰 최고! 고양이 발자국 남기고 갑니다🐾</div>
      </div>
      <form class="comment-form" onsubmit="submitComment(event)">
        <input type="text" class="comment-input" id="c-text" placeholder="댓글을 입력해 주세요." required>
        <button type="submit" class="comment-submit">등록</button>
      </form>
    </div>

  </div>
</div>

<script>
  const mountainData = {
    seoul: { name: '서울산', tags: ['beginner', 'foodie', 'spring'] },
    seorak: { name: '설악산', tags: ['autumn', 'foodie'] },
    jiri: { name: '지리산', tags: ['spring', 'autumn'] },
    taebaek: { name: '태백산', tags: ['beginner', 'summer'] },
    hallasan: { name: '한라산', tags: ['summer', 'foodie'] }
  };

  const mountainStates = { seoul: 0, seorak: 0, jiri: 0, taebaek: 0, hallasan: 0 };
  const icons = { 1: '🐾', 2: '🐱', 3: '🚩' };

  let currentActiveFilter = null;

  function filterTheme(themeTag) {
    const btn = document.getElementById(`btn-${themeTag}`);
    
    if (currentActiveFilter === themeTag) {
      currentActiveFilter = null;
      btn.classList.remove('active');
      resetFilters();
      return;
    }

    document.querySelectorAll('.filter-btn-mask').forEach(b => b.classList.remove('active'));
    
    currentActiveFilter = themeTag;
    btn.classList.add('active');

    Object.keys(mountainData).forEach(id => {
      const spot = document.getElementById(`spot-${id}`);
      if (mountainData[id].tags.includes(themeTag)) {
        spot.classList.remove('hidden');
      } else {
        spot.classList.add('hidden');
      }
    });
  }

  function searchMountain() {
    const keyword = document.getElementById('real-search-input').value.trim();
    
    if (!keyword) {
      if (currentActiveFilter) filterTheme(currentActiveFilter);
      else resetFilters();
      return;
    }

    Object.keys(mountainData).forEach(id => {
      const spot = document.getElementById(`spot-${id}`);
      if (mountainData[id].name.includes(keyword)) {
        spot.classList.remove('hidden');
      } else {
        spot.classList.add('hidden');
      }
    });
  }

  function resetFilters() {
    Object.keys(mountainData).forEach(id => {
      document.getElementById(`spot-${id}`).classList.remove('hidden');
    });
  }

  function toggleMountain(mountainId) {
    mountainStates[mountainId] = (mountainStates[mountainId] + 1) % 4;
    
    const spot = document.getElementById(`spot-${mountainId}`);
    const currentState = mountainStates[mountainId];

    const existingIcon = spot.querySelector('.status-icon');
    if (existingIcon) existingIcon.remove();

    if (currentState > 0) {
      const iconEl = document.createElement('div');
      iconEl.className = 'status-icon';
      iconEl.innerText = icons[currentState];
      spot.insertBefore(iconEl, spot.firstChild);
    }
  }

  function submitComment(event) {
    event.preventDefault();
    const input = document.getElementById('c-text');
    const list = document.getElementById('comment-list');
    
    if (!input.value.trim()) return;

    const anonymousUser = '산타크로버' + Math.floor(Math.random() * 900 + 100);
    const newItem = document.createElement('div');
    newItem.className = 'comment-item';
    newItem.innerHTML = `<span class="comment-author">${anonymousUser}</span>${input.value}`;
    
    list.appendChild(newItem);
    list.scrollTop = list.scrollHeight;
    input.value = '';
  }
</script>
</body>
</html>
