<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>산타 🐱 대한민국 100대 명산 지도</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; justify-content: center; align-items: center; background: #f0f2f5; font-family: sans-serif; min-height: 100vh; }
  
  /* 디자인 원본 이미지를 배경으로 깔아주는 컨테이너 */
  #santa-container {
    position: relative;
    width: 1000px; /* 원본 디자인 비율에 맞춤 */
    height: 1000px;
    background: url('image_9c597c.jpg') no-repeat center center;
    background-size: contain;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    overflow: hidden;
  }

  /* ── 1. 지도 위 클릭 가능한 산 인터랙티브 영역 ── */
  .mountain-spot {
    position: absolute;
    width: 45px;
    height: 45px;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 50%;
    transition: transform 0.2s;
    z-index: 10;
  }
  .mountain-spot:hover { transform: scale(1.15); }

  /* 주요 명산 좌표 설정 (이미지 비율에 맞춰 투명하게 배치) */
  #spot-seoul { top: 305px; left: 345px; } /* 서울산 위치 */
  #spot-seorak { top: 220px; left: 455px; } /* 설악산 위치 */
  #spot-jiri { top: 550px; left: 450px; } /* 지리산 위치 */

  /* 등산 상태 아이콘 (고양이 발바닥 / 고양이 얼굴 / 깃발) */
  .status-icon {
    font-size: 24px;
    width: 100%;
    height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    animation: popIn 0.3s ease-out;
    background: rgba(255, 255, 255, 0.85);
    border: 2px solid #4caf50;
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  @keyframes popIn {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
  }

  /* ── 2. 우측 하단 진짜 작동하는 댓글창 영역 ── */
  #real-comment-box {
    position: absolute;
    top: 575px; /* 원본 디자인 댓글 입력창 위치 크기 커스텀 마스킹 */
    left: 645px;
    width: 295px;
    height: 250px;
    background: #ffffff;
    border-radius: 12px;
    padding: 10px;
    display: flex;
    flex-direction: column;
    font-size: 12px;
    border: 1px solid #e0e0e0;
    z-index: 20;
  }
  #comment-list {
    flex: 1;
    overflow-y: auto;
    margin-bottom: 8px;
    padding-right: 5px;
  }
  .comment-item {
    padding: 6px 4px;
    border-bottom: 1px dashed #eee;
    line-height: 1.4;
  }
  .comment-author { font-weight: bold; color: #4caf50; margin-right: 5px; }
  .comment-form { display: flex; gap: 4px; }
  .comment-input { flex: 1; padding: 6px; border: 1px solid #ccc; border-radius: 6px; font-size: 11px; }
  .comment-submit { background: #2e2e2e; color: white; border: none; padding: 0 10px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  .comment-submit:hover { background: #000; }
</style>
</head>
<body>

<div id="app">
  <div id="santa-container">
    
    <!-- 지도 위 인터랙티브 산 스팟들 (클릭하면 상태 변경) -->
    <div class="mountain-spot" id="spot-seoul" onclick="toggleMountain('seoul')" title="서울산 등산 인증"></div>
    <div class="mountain-spot" id="spot-seorak" onclick="toggleMountain('seorak')" title="설악산 등산 인증"></div>
    <div class="mountain-spot" id="spot-jiri" onclick="toggleMountain('jiri')" title="지리산 등산 인증"></div>

    <!-- 작동하는 댓글창 마스킹 영역 -->
    <div id="real-comment-box">
      <div id="comment-list">
        <div class="comment-item"><span class="comment-author">산타매니아</span>가끔 가는데 등산 맛집이네요 👍</div>
        <div class="comment-item"><span class="comment-author">냥이조아</span>정상 뷰 최고! 고양이 발자국 남기고 갑니다🐾</div>
      </div>
      <form class="comment-form" onsubmit="submitComment(event)">
        <input type="text" class="comment-input" id="c-text" placeholder="댓글을 입력해 주세요." required>
        <button type="submit" class="comment-submit">등록</button>
      </form>
    </div>

  </div>
</div>

<script>
  // 산별 등산 상태 관리 (0: 미완료, 1: 발바닥, 2: 고양이 얼굴, 3: 깃발)
  const mountainStates = {
    seoul: 0,
    seorak: 0,
    jiri: 0
  };

  const icons = {
    1: '🐾', // 1단계: 고양이 발바닥
    2: '🐱', // 2단계: 고양이 얼굴
    3: '🚩'  // 3단계: 등산 완료 깃발
  };

  // 산 클릭 시 아이콘 순환 변경 기능
  function toggleMountain(mountainId) {
    // 상태 변경 (0 -> 1 -> 2 -> 3 -> 다시 0)
    mountainStates[mountainId] = (mountainStates[mountainId] + 1) % 4;
    
    const spot = document.getElementById(`spot-${mountainId}`);
    const currentState = mountainStates[mountainId];

    // 기존 아이콘 삭제
    spot.innerHTML = '';

    // 상태가 0이 아니면 새로운 아이콘 추가
    if (currentState > 0) {
      const iconEl = document.createElement('div');
      iconEl.className = 'status-icon';
      iconEl.innerText = icons[currentState];
      spot.appendChild(iconEl);
    }
  }

  // 실시간 댓글 등록 기능
  function submitComment(event) {
    event.preventDefault();
    const input = document.getElementById('c-text');
    const list = document.getElementById('comment-list');
    
    if (!input.value.trim()) return;

    // 익명 유저 네임 생성
    const anonymousUser = '산타크루' + Math.floor(Math.random() * 900 + 100);

    const newItem = document.createElement('div');
    newItem.className = 'comment-item';
    newItem.innerHTML = `<span class="comment-author">${anonymousUser}</span>${input.value}`;
    
    list.appendChild(newItem);
    list.scrollTop = list.scrollHeight; // 스크롤을 맨 아래로 이동
    
    input.value = ''; // 입력창 초기화
  }
</script>
</body>
</html>
